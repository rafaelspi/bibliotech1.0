version: "3.9"

name: bibliotech_1_0

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bibliotech_1_0
      POSTGRES_PASSWORD: bibliotech_1_0
      POSTGRES_DB: bibliotech_1_0
    ports:
      - "5433:5432"
    volumes:
      - bibliotech_1_0_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://bibliotech_1_0:bibliotech_1_0@postgres:5432/bibliotech_1_0
      JWT_SECRET: troque-este-segredo-em-producao
      PORT: 3000
    ports:
      - "3001:3000"

  frontend:
    build: .
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

  sonarqube:
    image: sonarqube:lts-community
    restart: unless-stopped
    ports:
      - "9001:9000"
    volumes:
      - bibliotech_1_0_sonar_data:/opt/sonarqube/data
      - bibliotech_1_0_sonar_extensions:/opt/sonarqube/extensions
      - bibliotech_1_0_sonar_logs:/opt/sonarqube/logs

volumes:
  bibliotech_1_0_pgdata:
  bibliotech_1_0_sonar_data:
  bibliotech_1_0_sonar_extensions:
  bibliotech_1_0_sonar_logs: